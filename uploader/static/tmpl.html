{{define "inputs"}}
<form hx-post="/upload" hx-swap="outerHTML" hx-encoding='multipart/form-data' id="uploadForm">
    {{ if .Id }}
    <div class="row py-2">
        <div class="col form-group">
            <label for="id" class="form-label">Roast ID</label>
            <input type="text" class="form-control" name="id" readonly value="{{.Id}}">
        </div>
    </div>
    {{ end }}
    <div class="row py-2">
        <div class="col form-group" style="position:relative;">
            <label for="beanName" class="form-label">Bean Name</label>
            <input type="text" class="form-control" name="beanName" id="beanName" placeholder="Type to search from inventory..." autocomplete="off" style="position:relative;z-index:1;">
            <div id="beanSuggestions" style="position:absolute;top:100%;left:0;right:0;z-index:10;max-height:200px;overflow-y:auto;display:none;"></div>
        </div>
        <div class="col form-group">
            <label for="purchaseUrl" class="form-label">Bean Purchase URL</label>
            <input class="form-control" type="text" name="purchaseUrl" id="purchaseUrl" value="{{.PurchaseUrl}}">
        </div>
    </div>
    <div class="row py-2">
        <div class="col form-group">
            <label for="greenBeanWeight" class="form-label">Green Bean Weight (grams)</label>
            <input class="form-control" type="text" name="greenBeanWeight" id="greenBeanWeight" value="{{.GreenBeanWeight}}">
        </div>
        <div class="col form-group">
            <label for="roastBeanWeight" class="form-label">Roasted Bean Weight (grams)</label>
            <input class="form-control" type="text" name="roastBeanWeight" id="roastBeanWeight" value="{{.RoastedBeanWeight}}">
        </div>
    </div>
    <div class="row py-2">
        <div class="col form-group">
            <label class="form-label">Taste Notes</label>
            <input type="text" class="form-control" name="tasteNotes" id="tasteNotes" value="{{.TasteNotes}}">
        </div>
    </div>
    <div class="row py-2">
        <div class="col form-group">
            <label class="form-label">Roast Notes (optional)</label>
            <textarea class="form-control" rows="5" name="roastNotes" id="roastNotes">{{.Roastnotes}}</textarea>
        </div>
    </div>
    <div class="row py-2">
        <div class="col form-group">
            <label for="beansImage" class="form-label">Beans Image</label>
            <input class="form-control" type="file" name="beansImage" id="beansImage">
        </div>
        <div class="col form-group">
            <label for="roastDataImage" class="form-label">Roast Data Image</label>
            <input class="form-control" type="file" name="roastDataImage" id="roastDataImage">
        </div>
    </div>
    <div class="row py-2">
        <div class="col">
            <button type="submit" class="btn btn-primary m-1">Upload</button>
        </div>
    </div>
</form>

<script>
// Auto-complete for the bean name input field.
// Fetches matching beans from /beans and auto-fills purchaseUrl & tasteNotes via /beans/fill.
(function() {
    // Cache DOM references for form fields and the suggestion container
    var beanInput     = document.getElementById('beanName');
    var suggestions   = document.getElementById('beanSuggestions');
    var purchaseInput = document.getElementById('purchaseUrl');
    var tasteInput    = document.getElementById('tasteNotes');
    var debounceTimer = null;

    // Guard: if required elements are missing, bail out early
    if (!beanInput || !suggestions) return;

    // Listen for typing in the bean name input
    beanInput.addEventListener('input', function() {
        // Cancel any pending fetch request (debouncing)
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(function() {
            var query = this.value.trim();

            // Hide suggestions if query is too short (prevent unnecessary server calls)
            if (query.length < 2) {
                suggestions.style.display = 'none';
                return;
            }

            // Show the container while we await the response
            suggestions.style.display = 'block';

            // Fetch matching beans from the server
            fetch('/beans?query=' + encodeURIComponent(query))
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    suggestions.innerHTML = '';

                    // Hide dropdown if no matches returned
                    if (!data.beans || data.beans.length === 0) {
                        suggestions.style.display = 'none';
                        return;
                    }

                    // Build a suggestion item for each matching bean
                    for (var i = 0; i < data.beans.length; i++) {
                        (function(bean) {
                            var item = document.createElement('div');
                            item.style.padding     = '8px 12px';
                            item.style.cursor      = 'pointer';
                            item.style.background  = '#212529';
                            item.style.color       = '#e9ecef';
                            item.style.fontFamily  = 'monospace';
                            item.style.borderBottom= '1px solid #495057';
                            item.textContent = bean;

                            // Hover effects for visual feedback
                            item.onmouseover = function() { this.style.background = '#375a7f'; };
                            item.onmouseout  = function() { this.style.background = '#212529'; };

                            // On click: select the bean and auto-fill related fields
                            item.onclick = function() {
                                beanInput.value = bean;        // populate the bean name field
                                suggestions.style.display = 'none';

                                // Fetch extra bean data (purchaseUrl, tasteNotes) from the server
                                fetch('/beans/fill', {
                                    method: 'POST',
                                    headers: {'Content-Type': 'application/json'},
                                    body: JSON.stringify({beanName: bean})
                                })
                                .then(function(r) { return r.json(); })
                                .then(function(resp) {
                                    purchaseInput.value = resp.purchaseUrl || '';
                                    tasteInput.value    = resp.tasteNotes    || '';
                                });
                            };

                            suggestions.appendChild(item);
                        })(data.beans[i]);
                    }
                })
                .catch(function(err) { console.error('beans error:', err); });

        }.bind(this), 200);  // Debounce delay: wait 200ms after last keystroke
    });

    // Hide the dropdown when the input loses focus (with a small delay to allow clicks)
    beanInput.addEventListener('blur', function() {
        setTimeout(function() { suggestions.style.display = 'none'; }, 200);
    });
})();
</script>
{{end}}

{{define "nav"}}
<nav class="navbar navbar-expand-lg">
    <a class="navbar-brand" href="/">Uploader</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup"
        aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
        <div class="navbar-nav">
            <a class="nav-link" href="/edit">Edit</a>
            <a class="nav-link" href="/shutdown">Shutdown</a>
        </div>
    </div>
</nav>
{{end}}
